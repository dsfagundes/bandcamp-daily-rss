name: Generate Bandcamp Daily RSS Feed

on:
  schedule:
    - cron: '0 6 * * *'   # runs every day at 6:00 AM UTC
  workflow_dispatch:        # allows manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        run: node bandcamp-daily-rss.js

      - name: Commit and push feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bandcamp-daily-feed.xml
          git diff --staged --quiet || git commit -m "Update RSS feed [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
